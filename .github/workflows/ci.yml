name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_images:
        description: Publish Docker images to the configured registry
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.0
  DEFAULT_IMAGE_REGISTRY: ghcr.io

jobs:
  rust:
    name: Test and build crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt
          rustup default "$RUST_VERSION"

      - name: Cache Cargo output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('**/*.rs', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build workspace
        run: cargo build --workspace --locked --release

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: rust
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image names
        run: |
          registry="${IMAGE_REGISTRY:-$DEFAULT_IMAGE_REGISTRY}"
          namespace="${IMAGE_NAMESPACE:-$GITHUB_REPOSITORY}"
          registry="${registry,,}"
          namespace="${namespace,,}"

          server_image="$registry/$namespace/papermake-server"
          worker_image="$registry/$namespace/papermake-worker"
          safe_ref="$(printf '%s' "$GITHUB_REF_NAME" | tr '/:@' '---' | tr -c 'A-Za-z0-9_.-' '-')"

          {
            echo "IMAGE_REGISTRY=$registry"
            echo "IMAGE_NAMESPACE=$namespace"
            echo "SERVER_IMAGE=$server_image"
            echo "WORKER_IMAGE=$worker_image"
            echo "SERVER_TAGS<<EOF"
            echo "$server_image:$GITHUB_SHA"
            if [ "$GITHUB_REF" = "refs/heads/$GITHUB_DEFAULT_BRANCH" ]; then
              echo "$server_image:latest"
            fi
            if [ -n "$safe_ref" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
              echo "$server_image:$safe_ref"
            fi
            echo "EOF"
            echo "WORKER_TAGS<<EOF"
            echo "$worker_image:$GITHUB_SHA"
            if [ "$GITHUB_REF" = "refs/heads/$GITHUB_DEFAULT_BRANCH" ]; then
              echo "$worker_image:latest"
            fi
            if [ -n "$safe_ref" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
              echo "$worker_image:$safe_ref"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/papermake-server/Dockerfile
          push: false
          tags: ${{ env.SERVER_TAGS }}
          cache-from: type=gha,scope=papermake-server
          cache-to: type=gha,mode=max,scope=papermake-server

      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/papermake-worker/Dockerfile
          push: false
          tags: ${{ env.WORKER_TAGS }}
          cache-from: type=gha,scope=papermake-worker
          cache-to: type=gha,mode=max,scope=papermake-worker

      - name: Login to registry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_images }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ vars.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Publish server image
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_images }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/papermake-server/Dockerfile
          push: true
          tags: ${{ env.SERVER_TAGS }}
          cache-from: type=gha,scope=papermake-server
          cache-to: type=gha,mode=max,scope=papermake-server

      - name: Publish worker image
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_images }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/papermake-worker/Dockerfile
          push: true
          tags: ${{ env.WORKER_TAGS }}
          cache-from: type=gha,scope=papermake-worker
          cache-to: type=gha,mode=max,scope=papermake-worker
