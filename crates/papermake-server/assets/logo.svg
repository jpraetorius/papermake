<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Paper crane">
  <!-- Origami paper crane. Two cornflower-blue tones for a folded look. -->
  <!-- Deeper fold: right wing, tail, beak -->
  <polygon points="32,26 58,46 34,40" fill="#7BA3EF"/>
  <polygon points="32,26 56,12 46,18" fill="#7BA3EF"/>
  <polygon points="10,10 3,13 13,16" fill="#7BA3EF"/>
  <!-- Light fold: left wing, neck, body/keel -->
  <polygon points="32,26 6,46 30,40" fill="#A9C7F5"/>
  <polygon points="32,26 10,10 18,15" fill="#A9C7F5"/>
  <polygon points="30,40 34,40 32,58" fill="#A9C7F5"/>
</svg>
