apiVersion: apps/v1
kind: Deployment
metadata:
  name: papermake-render-worker
  namespace: papermake
  labels:
    app.kubernetes.io/name: papermake
    app.kubernetes.io/component: render-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: papermake
      app.kubernetes.io/component: render-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: papermake
        app.kubernetes.io/component: render-worker
    spec:
      containers:
        - name: worker
          image: papermake-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: papermake-config
            - secretRef:
                name: papermake-s3
          env:
            - name: WORKER_ROLE
              value: render
            - name: WORKER_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: papermake-config
                  key: RENDER_WORKER_INTERVAL_SECONDS
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: papermake-config
                  key: WORKER_RUST_LOG
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      terminationGracePeriodSeconds: 75
