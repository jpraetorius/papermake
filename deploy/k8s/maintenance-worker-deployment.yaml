apiVersion: apps/v1
kind: Deployment
metadata:
  name: papermake-maintenance
  namespace: papermake
  labels:
    app.kubernetes.io/name: papermake
    app.kubernetes.io/component: maintenance
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: papermake
      app.kubernetes.io/component: maintenance
  template:
    metadata:
      labels:
        app.kubernetes.io/name: papermake
        app.kubernetes.io/component: maintenance
    spec:
      containers:
        - name: worker
          image: papermake-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: papermake-config
            - secretRef:
                name: papermake-s3
          env:
            - name: WORKER_ROLE
              value: maintenance
            - name: PAPERMAKE_WORKER_ID
              value: maintenance-1
            - name: WORKER_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: papermake-config
                  key: MAINTENANCE_WORKER_INTERVAL_SECONDS
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: papermake-config
                  key: WORKER_RUST_LOG
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      terminationGracePeriodSeconds: 75
