apiVersion: apps/v1
kind: Deployment
metadata:
  name: papermake-server
  namespace: papermake
  labels:
    app.kubernetes.io/name: papermake
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: papermake
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: papermake
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: papermake-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: papermake-config
            - secretRef:
                name: papermake-s3
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: papermake-config
                  key: SERVER_RUST_LOG
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      terminationGracePeriodSeconds: 30
