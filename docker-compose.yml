services:
  # Papermake Server - Template registry HTTP API + SSR UI
  papermake-server:
    build:
      context: .
      dockerfile: crates/papermake-server/Dockerfile
    container_name: papermake-server
    ports:
      - "3000:3000"
    environment:
      # Server configuration
      HOST: "0.0.0.0"
      PORT: "3000"

      # S3 Storage configuration (RustFS)
      S3_ENDPOINT_URL: "http://rustfs:9000"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"

      # Buffered analytics + retention
      PAPERMAKE_INSTANCE_ID: "server-1"
      FLUSH_INTERVAL_SECONDS: "30"
      FLUSH_MAX_RECORDS: "1000"
      RENDER_RETENTION_DAYS: "30"
      # Items per batch shard (unit of work a worker claims).
      SHARD_SIZE: "500"

      # Optional: Enable debug logging
      RUST_LOG: "papermake_server=debug,papermake_registry=debug"
    depends_on:
      rustfs:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - papermake
    volumes:
      # Fonts are provided via this mount (FONTS_DIR=/fonts in the image), on top
      # of Typst's embedded set — nothing is baked in. ./fonts is gitignored, so
      # drop the TTF/OTF/TTC files your templates need in there.
      - ./fonts:/fonts:ro
    # No container healthcheck: the distroless runtime image has no shell/curl.
    # Probe from the host instead: curl -f http://localhost:3000/health

  # Rendering workers (WORKER_ROLE=render) — poll for batch shards and render
  # them. Stateless and scalable: `podman compose up -d --scale papermake-worker=N`
  # to split a big batch across N workers. No container_name / PAPERMAKE_WORKER_ID
  # so each replica auto-gets a unique id (its hostname). They do NOT aggregate or
  # prune — that's the maintenance worker's job.
  papermake-worker:
    build:
      context: .
      dockerfile: crates/papermake-worker/Dockerfile
    image: papermake-worker:local
    environment:
      WORKER_ROLE: "render"
      S3_ENDPOINT_URL: "http://rustfs:9000"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"
      # WORKER_INTERVAL_SECONDS defaults to 5s for the render role (fast pickup).
      WORKER_LEASE_SECONDS: "120"
      WORKER_MAX_ATTEMPTS: "3"
      RENDER_RETENTION_DAYS: "30"
      RUST_LOG: "papermake_worker=info,papermake_registry=info"
    depends_on:
      rustfs:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - papermake
    volumes:
      # Same /fonts mount as the server, so batch renders resolve the same fonts.
      - ./fonts:/fonts:ro

  # Maintenance worker (WORKER_ROLE=maintenance) — aggregates analytics into
  # summary.json and prunes expired outputs / old raw / stale jobs, every cycle,
  # independent of render load. Run exactly ONE (idempotent, but redundant if
  # duplicated). Reuses the worker image (no rebuild). Does no rendering.
  papermake-maintenance:
    image: papermake-worker:local
    container_name: papermake-maintenance
    environment:
      WORKER_ROLE: "maintenance"
      S3_ENDPOINT_URL: "http://rustfs:9000"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"
      PAPERMAKE_WORKER_ID: "maintenance-1"
      # WORKER_INTERVAL_SECONDS defaults to 30s for the maintenance role.
      ANALYTICS_RETENTION_DAYS: "30"
      JOB_RETENTION_DAYS: "7"
      RUST_LOG: "papermake_worker=info,papermake_registry=info"
    depends_on:
      rustfs:
        condition: service_healthy
      papermake-worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - papermake

  # RustFS - S3-compatible object storage (Apache-2.0, Rust, MinIO-compatible).
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: papermake-rustfs
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      RUSTFS_VOLUMES: "/data"
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      # S3 credentials — must match the S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY above
      RUSTFS_ACCESS_KEY: "minioadmin"
      RUSTFS_SECRET_KEY: "minioadmin"
      RUSTFS_OBS_LOGGER_LEVEL: "info"
    volumes:
      - rustfs_data:/data
    restart: unless-stopped
    networks:
      - papermake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  rustfs_data:

networks:
  papermake:
    driver: bridge
