services:
  # Papermake Server - Template registry HTTP API + SSR UI
  papermake-server:
    build:
      context: .
      dockerfile: crates/papermake-server/Dockerfile
    container_name: papermake-server
    ports:
      - "3000:3000"
    environment:
      # Server configuration
      HOST: "0.0.0.0"
      PORT: "3000"

      # S3 Storage configuration (MinIO)
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"

      # Buffered analytics + retention
      PAPERMAKE_INSTANCE_ID: "server-1"
      FLUSH_INTERVAL_SECONDS: "30"
      FLUSH_MAX_RECORDS: "1000"
      RENDER_RETENTION_DAYS: "30"

      # Optional: Enable debug logging
      RUST_LOG: "papermake_server=debug,papermake_registry=debug"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - papermake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 2s
      timeout: 10s
      retries: 3

  # Papermake Worker - aggregates raw analytics into summary.json and prunes
  # expired outputs. One aggregator regardless of render-instance count.
  papermake-worker:
    build:
      context: .
      dockerfile: crates/papermake-worker/Dockerfile
    container_name: papermake-worker
    environment:
      # Shares the same MinIO/S3 as the server
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"

      WORKER_INTERVAL_SECONDS: "60"
      ANALYTICS_RETENTION_DAYS: "30"

      RUST_LOG: "papermake_worker=info,papermake_registry=info"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - papermake

  # MinIO S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: papermake-minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - papermake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 10s
      retries: 3

volumes:
  minio_data:

networks:
  papermake:
    driver: bridge
