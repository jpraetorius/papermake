services:
  # Papermake Server - Template registry HTTP API + SSR UI
  papermake-server:
    build:
      context: .
      dockerfile: crates/papermake-server/Dockerfile
    container_name: papermake-server
    ports:
      - "3000:3000"
    environment:
      # Server configuration
      HOST: "0.0.0.0"
      PORT: "3000"

      # S3 Storage configuration (SeaweedFS)
      S3_ENDPOINT_URL: "http://seaweedfs:8333"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"

      # Buffered analytics + retention
      PAPERMAKE_INSTANCE_ID: "server-1"
      FLUSH_INTERVAL_SECONDS: "30"
      FLUSH_MAX_RECORDS: "1000"
      RENDER_RETENTION_DAYS: "30"

      # Optional: Enable debug logging
      RUST_LOG: "papermake_server=debug,papermake_registry=debug"
    depends_on:
      seaweedfs:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - papermake
    # No container healthcheck: the distroless runtime image has no shell/curl.
    # Probe from the host instead: curl -f http://localhost:3000/health

  # Papermake Worker - aggregates raw analytics into summary.json and prunes
  # expired outputs. One aggregator regardless of render-instance count.
  papermake-worker:
    build:
      context: .
      dockerfile: crates/papermake-worker/Dockerfile
    container_name: papermake-worker
    environment:
      # Shares the same SeaweedFS/S3 as the server
      S3_ENDPOINT_URL: "http://seaweedfs:8333"
      S3_REGION: "us-east-1"
      S3_BUCKET: "papermake-templates"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"

      WORKER_INTERVAL_SECONDS: "60"
      ANALYTICS_RETENTION_DAYS: "30"

      RUST_LOG: "papermake_worker=info,papermake_registry=info"
    depends_on:
      seaweedfs:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - papermake

  # SeaweedFS - S3-compatible object storage (Apache-2.0, actively maintained).
  # All-in-one node: master (:9333), volume, filer (:8888), and S3 gateway (:8333).
  seaweedfs:
    image: chrislusf/seaweedfs:4.38
    container_name: papermake-seaweedfs
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # master (status/console)
      - "8888:8888" # filer
    command:
      - server
      - "-dir=/data"
      - "-ip=seaweedfs"
      - "-s3"
      - "-s3.port=8333"
      - "-s3.config=/etc/seaweedfs/s3.json"
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    restart: unless-stopped
    networks:
      - papermake
    healthcheck:
      # The S3 port has no health endpoint (it treats /healthz as a bucket), so
      # probe the master. `wget` ships in the alpine-based image.
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  seaweedfs_data:

networks:
  papermake:
    driver: bridge
