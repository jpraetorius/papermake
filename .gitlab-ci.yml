stages:
  - test
  - image
  - publish

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  CARGO_TERM_COLOR: always
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: ""
  RUST_VERSION: "1.97.0"

.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: cargo-rust-1-97
    fallback_keys:
      - cargo-rust-1-97-$CI_DEFAULT_BRANCH
      - cargo-rust-1-97
    paths:
      - .cargo/git/
      - .cargo/registry/
      - target/
    policy: pull-push

.buildx_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: buildx-$CI_COMMIT_REF_SLUG
    fallback_keys:
      - buildx-$CI_DEFAULT_BRANCH
      - buildx
    paths:
      - .buildx-cache/
    policy: pull-push

.docker:
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker buildx create --use --name papermake-ci
    - docker buildx inspect --bootstrap

test-and-build-crates:
  stage: test
  image: rust:${RUST_VERSION}-slim
  extends: .cargo_cache
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check
    - cargo test --workspace --locked
    - cargo build --workspace --locked --release

build-docker-images:
  stage: image
  extends:
    - .docker
    - .buildx_cache
  script:
    - mkdir -p .buildx-cache/server .buildx-cache/worker .buildx-cache-new
    - >
      docker buildx build
      --file crates/papermake-server/Dockerfile
      --tag "$CI_REGISTRY_IMAGE/papermake-server:$CI_COMMIT_SHA"
      --cache-from type=local,src=.buildx-cache/server
      --cache-to type=local,dest=.buildx-cache-new/server,mode=max
      --load
      .
    - rm -rf .buildx-cache/server
    - mv .buildx-cache-new/server .buildx-cache/server
    - >
      docker buildx build
      --file crates/papermake-worker/Dockerfile
      --tag "$CI_REGISTRY_IMAGE/papermake-worker:$CI_COMMIT_SHA"
      --cache-from type=local,src=.buildx-cache/worker
      --cache-to type=local,dest=.buildx-cache-new/worker,mode=max
      --load
      .
    - rm -rf .buildx-cache/worker
    - mv .buildx-cache-new/worker .buildx-cache/worker

publish-docker-images:
  stage: publish
  extends:
    - .docker
    - .buildx_cache
  needs:
    - build-docker-images
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
    - SERVER_TAGS="--tag $CI_REGISTRY_IMAGE/papermake-server:$CI_COMMIT_SHA"
    - WORKER_TAGS="--tag $CI_REGISTRY_IMAGE/papermake-worker:$CI_COMMIT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        SERVER_TAGS="$SERVER_TAGS --tag $CI_REGISTRY_IMAGE/papermake-server:latest"
        WORKER_TAGS="$WORKER_TAGS --tag $CI_REGISTRY_IMAGE/papermake-worker:latest"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        REF_TAG="$(printf '%s' "$CI_COMMIT_TAG" | tr '/:@' '---' | tr -c 'A-Za-z0-9_.-' '-')"
        SERVER_TAGS="$SERVER_TAGS --tag $CI_REGISTRY_IMAGE/papermake-server:$REF_TAG"
        WORKER_TAGS="$WORKER_TAGS --tag $CI_REGISTRY_IMAGE/papermake-worker:$REF_TAG"
      fi
    - mkdir -p .buildx-cache/server .buildx-cache/worker .buildx-cache-new
    - >
      docker buildx build
      --file crates/papermake-server/Dockerfile
      $SERVER_TAGS
      --cache-from type=local,src=.buildx-cache/server
      --cache-to type=local,dest=.buildx-cache-new/server,mode=max
      --push
      .
    - rm -rf .buildx-cache/server
    - mv .buildx-cache-new/server .buildx-cache/server
    - >
      docker buildx build
      --file crates/papermake-worker/Dockerfile
      $WORKER_TAGS
      --cache-from type=local,src=.buildx-cache/worker
      --cache-to type=local,dest=.buildx-cache-new/worker,mode=max
      --push
      .
    - rm -rf .buildx-cache/worker
    - mv .buildx-cache-new/worker .buildx-cache/worker
