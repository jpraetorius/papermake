stages:
  - test
  - image
  - publish

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.97.0"
  # Pinned so the image jobs are reproducible. Shared with worddown's pipeline.
  DOCKER_IMAGE: "docker:29-cli@sha256:d14410ab6f87a2b6c14b7150de787cd7b8bb012a8e900966d6d893e9f7fc49b6"

.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: cargo-rust-1-97
    fallback_keys:
      - cargo-rust-1-97-$CI_DEFAULT_BRANCH
      - cargo-rust-1-97
    paths:
      - .cargo/git/
      - .cargo/registry/
      - target/
    policy: pull-push

# Compile the workspace once here and hand the release binaries to the image
# jobs as artifacts. The Dockerfiles consume them via `--build-context dist=...`,
# so no Rust is compiled inside Docker — that in-image compile was the flaky,
# slow part of the old BuildKit pipeline.
test-and-build-crates:
  stage: test
  image: rust:${RUST_VERSION}-slim
  extends: .cargo_cache
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check
    - cargo test --workspace --locked
    - cargo build --workspace --locked --release
    - install -Dm755 target/release/papermake-server dist/papermake-server
    - install -Dm755 target/release/papermake-worker dist/papermake-worker
  artifacts:
    expire_in: 1 day
    paths:
      - dist/papermake-server
      - dist/papermake-worker

# Build both runtime images from the prebuilt binaries. We build but do NOT
# push to any registry yet — pushing lives in the manual publish job below.
build-docker-images:
  stage: image
  image: $DOCKER_IMAGE
  needs:
    - job: test-and-build-crates
      artifacts: true
  script:
    - docker build --build-context dist=./dist -f crates/papermake-server/Dockerfile -t "papermake-server:$CI_COMMIT_SHA" .
    - docker build --build-context dist=./dist -f crates/papermake-worker/Dockerfile -t "papermake-worker:$CI_COMMIT_SHA" .

# Push images to the registry. Manual and allow_failure so the default pipeline
# only builds — flip this on (and provide $CI_REGISTRY* credentials) when we are
# ready to publish.
publish-docker-images:
  stage: publish
  image: $DOCKER_IMAGE
  needs:
    - job: test-and-build-crates
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  before_script:
    - printf '%s' "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - |
      server="$CI_REGISTRY_IMAGE/papermake-server"
      worker="$CI_REGISTRY_IMAGE/papermake-worker"
      server_tags="-t $server:$CI_COMMIT_SHA"
      worker_tags="-t $worker:$CI_COMMIT_SHA"
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        server_tags="$server_tags -t $server:latest"
        worker_tags="$worker_tags -t $worker:latest"
      fi
      if [ -n "$CI_COMMIT_TAG" ]; then
        ref_tag="$(printf '%s' "$CI_COMMIT_TAG" | tr -c 'A-Za-z0-9_.-' '-')"
        server_tags="$server_tags -t $server:$ref_tag"
        worker_tags="$worker_tags -t $worker:$ref_tag"
      fi
      docker build --build-context dist=./dist -f crates/papermake-server/Dockerfile $server_tags --push .
      docker build --build-context dist=./dist -f crates/papermake-worker/Dockerfile $worker_tags --push .
