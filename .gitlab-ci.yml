stages:
  - test
  - image
  - publish

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.97.0"

.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: cargo-rust-1-97
    fallback_keys:
      - cargo-rust-1-97-$CI_DEFAULT_BRANCH
      - cargo-rust-1-97
    paths:
      - .cargo/git/
      - .cargo/registry/
      - target/
    policy: pull-push

.buildkit_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: buildkit-$CI_COMMIT_REF_SLUG
    fallback_keys:
      - buildkit-$CI_DEFAULT_BRANCH
      - buildkit
    paths:
      - .buildkit-cache/
    policy: pull-push

.buildkit:
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox

test-and-build-crates:
  stage: test
  image: rust:${RUST_VERSION}-slim
  extends: .cargo_cache
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check
    - cargo test --workspace --locked
    - cargo build --workspace --locked --release

build-docker-images:
  stage: image
  extends:
    - .buildkit
    - .buildkit_cache
  script:
    - mkdir -p .buildkit-cache/server .buildkit-cache/worker .buildkit-cache-new
    - |
      SERVER_IMPORT_CACHE=
      if [ -f .buildkit-cache/server/index.json ]; then
        SERVER_IMPORT_CACHE="--import-cache type=local,src=.buildkit-cache/server"
      fi
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt filename=crates/papermake-server/Dockerfile \
        $SERVER_IMPORT_CACHE \
        --export-cache type=local,dest=.buildkit-cache-new/server,mode=max
    - rm -rf .buildkit-cache/server
    - mv .buildkit-cache-new/server .buildkit-cache/server
    - |
      WORKER_IMPORT_CACHE=
      if [ -f .buildkit-cache/worker/index.json ]; then
        WORKER_IMPORT_CACHE="--import-cache type=local,src=.buildkit-cache/worker"
      fi
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt filename=crates/papermake-worker/Dockerfile \
        $WORKER_IMPORT_CACHE \
        --export-cache type=local,dest=.buildkit-cache-new/worker,mode=max
    - rm -rf .buildkit-cache/worker
    - mv .buildkit-cache-new/worker .buildkit-cache/worker

publish-docker-images:
  stage: publish
  extends:
    - .buildkit
    - .buildkit_cache
  needs:
    - build-docker-images
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  before_script:
    - mkdir -p "$HOME/.docker"
    - |
      AUTH="$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$CI_REGISTRY" "$AUTH" > "$HOME/.docker/config.json"
  script:
    - SERVER_IMAGE_NAMES="$CI_REGISTRY_IMAGE/papermake-server:$CI_COMMIT_SHA"
    - WORKER_IMAGE_NAMES="$CI_REGISTRY_IMAGE/papermake-worker:$CI_COMMIT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        SERVER_IMAGE_NAMES="$SERVER_IMAGE_NAMES,$CI_REGISTRY_IMAGE/papermake-server:latest"
        WORKER_IMAGE_NAMES="$WORKER_IMAGE_NAMES,$CI_REGISTRY_IMAGE/papermake-worker:latest"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        REF_TAG="$(printf '%s' "$CI_COMMIT_TAG" | tr '/:@' '---' | tr -c 'A-Za-z0-9_.-' '-')"
        SERVER_IMAGE_NAMES="$SERVER_IMAGE_NAMES,$CI_REGISTRY_IMAGE/papermake-server:$REF_TAG"
        WORKER_IMAGE_NAMES="$WORKER_IMAGE_NAMES,$CI_REGISTRY_IMAGE/papermake-worker:$REF_TAG"
      fi
    - mkdir -p .buildkit-cache/server .buildkit-cache/worker .buildkit-cache-new
    - |
      SERVER_IMPORT_CACHE=
      if [ -f .buildkit-cache/server/index.json ]; then
        SERVER_IMPORT_CACHE="--import-cache type=local,src=.buildkit-cache/server"
      fi
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt filename=crates/papermake-server/Dockerfile \
        $SERVER_IMPORT_CACHE \
        --export-cache type=local,dest=.buildkit-cache-new/server,mode=max \
        --output "type=image,name=$SERVER_IMAGE_NAMES,push=true"
    - rm -rf .buildkit-cache/server
    - mv .buildkit-cache-new/server .buildkit-cache/server
    - |
      WORKER_IMPORT_CACHE=
      if [ -f .buildkit-cache/worker/index.json ]; then
        WORKER_IMPORT_CACHE="--import-cache type=local,src=.buildkit-cache/worker"
      fi
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt filename=crates/papermake-worker/Dockerfile \
        $WORKER_IMPORT_CACHE \
        --export-cache type=local,dest=.buildkit-cache-new/worker,mode=max \
        --output "type=image,name=$WORKER_IMAGE_NAMES,push=true"
    - rm -rf .buildkit-cache/worker
    - mv .buildkit-cache-new/worker .buildkit-cache/worker
